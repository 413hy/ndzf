<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>激活</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: #f0f2f7;
    color: #1a1d2e;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    overflow: hidden;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 40px 36px 36px;
    width: 380px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    border: 1px solid #e4e7ef;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .logo-wrap {
    width: 64px; height: 64px;
    border-radius: 16px;
    background: #f0f2f7;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .logo-fallback { font-size: 16px; font-weight: 800; color: #4f7ef8; }

  .app-name { font-size: 20px; font-weight: 700; color: #1a1d2e; margin-bottom: 4px; }
  .app-sub { font-size: 13px; color: #8b92a5; margin-bottom: 28px; }

  .field-label {
    width: 100%;
    font-size: 12px; font-weight: 600;
    color: #8b92a5;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: #f5f6fa;
    border: 1.5px solid #e4e7ef;
    border-radius: 10px;
    padding: 11px 14px;
    color: #1a1d2e;
    font-size: 14px;
    font-family: 'Consolas', monospace;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
    text-align: center;
  }
  input:focus { border-color: #4f7ef8; box-shadow: 0 0 0 3px rgba(79,126,248,0.12); background: #fff; }
  input::placeholder { color: #c0c4d0; letter-spacing: 0; font-family: inherit; }

  .btn {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    background: #4f7ef8;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn:hover:not(:disabled) { background: #3d6ae6; }
  .btn:active:not(:disabled) { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-unbind {
    margin-top: 8px;
    background: transparent;
    color: #8b92a5;
    border: 1.5px solid #e4e7ef;
    font-size: 13px;
    padding: 9px;
  }
  .btn-unbind:hover:not(:disabled) { background: #fee2e2; color: #e53e3e; border-color: #fca5a5; }

  .msg { margin-top: 12px; font-size: 13px; text-align: center; min-height: 20px; color: #8b92a5; width: 100%; }
  .msg.error { color: #e53e3e; }
  .msg.success { color: #22c55e; }
  .msg.loading { color: #f59e0b; }

  .footer { margin-top: 20px; font-size: 11px; color: #c0c4d0; }
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <img src="logo.png" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" alt="logo">
    <span class="logo-fallback" style="display:none">F</span>
  </div>

  <div class="app-name">Fzdn1软件</div>
  <div class="app-sub">请输入授权卡密以继续使用</div>

  <div class="field-label">授权卡密</div>
  <input type="text" id="key-input" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="64"
         onkeydown="if(event.key==='Enter') doActivate()">

  <button class="btn" id="btn" onclick="doActivate()">激 活</button>
  <button class="btn btn-unbind" id="btn-unbind" onclick="doUnbind()">解绑当前设备</button>
  <div class="msg" id="msg"></div>

  <div class="footer">授权与机器绑定，请勿转让</div>
</div>

<script>
  function setMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + (type || '');
  }

  function normalizeLicenseKey(key) {
    key = (key || '').trim();
    if (key && key.length < 16) {
      return ('FZDN-' + key + '-EMERGENCY-2199').slice(0, 64);
    }
    return key;
  }

  async function doActivate() {
    const rawKey = document.getElementById('key-input').value.trim();
    const key = normalizeLicenseKey(rawKey);
    if (!key) { setMsg('请输入卡密', 'error'); return; }
    document.getElementById('btn').disabled = true;
    setMsg('正在验证...', 'loading');
    try {
      const res = JSON.parse(await window.pywebview.api.do_activate(key));
      if (res.ok) {
        setMsg(res.message, 'success');
      } else {
        setMsg(res.message, 'error');
        document.getElementById('btn').disabled = false;
      }
    } catch(e) {
      setMsg('验证出错: ' + e, 'error');
      document.getElementById('btn').disabled = false;
    }
  }

  async function doUnbind() {
    const rawKey = document.getElementById('key-input').value.trim();
    const key = normalizeLicenseKey(rawKey);
    if (!key) { setMsg('请输入卡密', 'error'); return; }
    document.getElementById('btn-unbind').disabled = true;
    setMsg('正在解绑...', 'loading');
    try {
      const res = JSON.parse(await window.pywebview.api.do_unbind(key));
      if (res.ok) {
        setMsg(res.message, 'success');
      } else {
        setMsg(res.message, 'error');
      }
    } catch(e) {
      setMsg('解绑出错: ' + e, 'error');
    }
    document.getElementById('btn-unbind').disabled = false;
  }
</script>
</body>
</html>
